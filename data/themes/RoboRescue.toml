# Custom theme definition for RoboRescue UMA
# Light and dark palettes; adjust as desired.
name = "RoboRescue"

[light]
primary = "#04a4c4"           # Accent / brand cyan
primary_light = "#7de7fe"
primary_dark = "#037d95"
background = "#FFFFFF"
home_section_odd = "#FFFFFF"
home_section_even = "#F2F3F5" # Slightly higher contrast
menu_primary = "#293b5b"      # Dark blue for menu
menu_text = "#FFFFFF"
menu_text_active = "#04a4c4"
menu_title = "#FFFFFF"
link = "#037d95"              # Dark cyan for links
link_hover = "#04a4c4"        # Lighter cyan on hover
border = "#D4D4D8"
text = "#1A1A1A"
heading = "#293b5b"
link_decoration = true

[dark]
primary = "#04a4c4"
primary_light = "#7de7fe"
primary_dark = "#037d95"
background = "#1b283a"
home_section_odd = "#1b283a"
home_section_even = "#293b5b" # Slight modulation
menu_primary = "#1b283a"
menu_text = "#EFEFEF"
menu_text_active = "#7de7fe"
menu_title = "#FFFFFF"
link = "#7de7fe"
link_hover = "#04a4c4"        # Higher contrast hover
border = "#293b5b"
text = "#E4E4E7"
heading = "#FAFAFA"
link_decoration = true
