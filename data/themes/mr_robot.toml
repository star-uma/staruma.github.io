# Custom theme definition for RoboRescue UMA
# Light and dark palettes; adjust as desired.
name = "mr_robot"

[light]
primary = "#04a4c4"
primary_light = "#7de7fe"
primary_dark = "#037d95"
background = "#ebfbff"
home_section_odd = "#FFFFFF"
home_section_even = "#F2F3F5"
menu_primary = "#037D95"
menu_text = "#ffffff"
menu_text_active = "#04a4c4"
menu_title = "#1B283A"
link = "#037d95"
link_hover = "#04a4c4"
border = "#D4D4D8"
text = "#1A1A1A"
heading = "#04A4C4"
link_decoration = true

[dark]
primary = "#04a4c4"
primary_light = "#7de7fe"
primary_dark = "#037d95"
background = "#1b283a"
home_section_odd = "#1b283a"
home_section_even = "#293b5b" # Slight modulation
menu_primary = "#1b283a"
menu_text = "#EFEFEF"
menu_text_active = "#7de7fe"
menu_title = "#FFFFFF"
link = "#7de7fe"
link_hover = "#04a4c4"        # Higher contrast hover
border = "#293b5b"
text = "#E4E4E7"
heading = "#FAFAFA"
link_decoration = true
